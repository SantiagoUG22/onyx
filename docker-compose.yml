services:
  onyx-backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: onyx-backend
    ports:
      - "5000:5000"
    volumes:
      - ./back/data:/app/data
    restart: always
    environment:
      - PORT=5000
      - PYTHONUNBUFFERED=1

  onyx-frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: onyx-frontend
    ports:
      - "80:80"
    restart: always
    depends_on:
      - onyx-backend